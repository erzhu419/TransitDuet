_extends: F_freqduet_terminal_waitattr_hiro.yaml
_name: F_freqduet_terminal_spline2dir_waitattr_hiro

upper:
  timetable_planner:
    # Direction-specific 2-basis timetable curve with per-direction replans.
    # This keeps the richer action surface while preserving the scalar path's
    # upper decision count and direction-local event timing.
    basis_per_direction: 2
    shared_directions: false
    plan_all_directions: false
    action_ema_alpha: 0.35
    smooth_penalty: 0.04
    delta_min_s: -60.0
    delta_max_s: 20.0
