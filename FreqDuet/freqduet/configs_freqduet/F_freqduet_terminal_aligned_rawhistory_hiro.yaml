_extends: F_freqduet_terminal_spline2dir_waitattr_hiro.yaml
_name: F_freqduet_terminal_aligned_rawhistory_hiro

frequency:
  # Reviewer-facing baseline: expose trailing raw demand history instead of a
  # causal low/high decomposition while keeping the current timetable surface.
  method: raw_history
  upper_features: true
  lower_features: true
  replace_upper_demand_with_low: true
  upper_history_bins: 6
  lower_history_bins: 6
  od_features: false

reward_attribution:
  enable: false
