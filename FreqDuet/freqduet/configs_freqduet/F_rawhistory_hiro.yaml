_extends: config_v2.yaml
_name: F_rawhistory_hiro

upper:
  # 11 original v2k dims, raw demand replaced by the newest realized-demand
  # bin, plus five older trailing bins.
  state_dim: 16

coupling:
  coupling_mode: hiro

frequency:
  enable: true
  method: raw_history
  upper_features: true
  lower_features: true
  replace_upper_demand_with_low: true
  upper_history_bins: 6
  lower_history_bins: 6

  global_demand_norm: 50.0
  local_demand_norm: 10.0
  slope_norm: 5.0

leakage:
  enable: false
