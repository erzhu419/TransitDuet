# adaptive strict local promotion absorption, the stronger positive-HF
# hold-through penalty, and promotion-gated raw lower-HF wait credit. The raw
# credit gate improved terminal/highnoise/OD/rush held-outs versus the previous
# main while keeping rush/OD from receiving broad raw-residual lower credit.
