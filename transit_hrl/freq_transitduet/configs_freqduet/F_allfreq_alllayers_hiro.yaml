_extends: config_v2.yaml
_name: F_allfreq_alllayers_hiro

upper:
  # Upper sees low and high frequency features instead of the intended split.
  state_dim: 18

coupling:
  coupling_mode: hiro

frequency:
  enable: true
  method: harmonic
  upper_features: true
  lower_features: true
  upper_mode: all
  lower_mode: all
  od_features: true
  replace_upper_demand_with_low: true

  bin_sec: 60
  use_historical_prior: true
  harmonic_period_s: 50400.0
  fourier_K: 4
  harmonic_forgetting: 0.9995
  harmonic_prior_var: 0.01
  harmonic_ridge: 0.01
  energy_period_s: 600.0
  forecast_horizon_s: 1800.0

  global_demand_norm: 50.0
  local_demand_norm: 10.0
  slope_norm: 5.0

leakage:
  enable: false
