_extends: config_v2.yaml
_name: F_freqduet_haar_hiro

upper:
  # 11 original v2k upper dims, with raw demand replaced by low-frequency
  # realized demand, three frequency diagnostics, and two OD-structure features.
  state_dim: 16

coupling:
  coupling_mode: hiro

frequency:
  enable: true
  method: haar
  upper_features: true
  lower_features: true
  od_features: true
  replace_upper_demand_with_low: true

  # Causal Haar-style trailing windows. The low component is the long trailing
  # trend; the high component is a short-window residual. No future demand is
  # used.
  low_period_s: 3600.0
  fast_period_s: 300.0
  energy_period_s: 600.0
  forecast_horizon_s: 1800.0

  global_demand_norm: 50.0
  local_demand_norm: 10.0
  slope_norm: 5.0

leakage:
  enable: true
  lower_drift_window: 24
  lower_drift_budget_s: 180.0
  lower_drift_penalty: 0.08
  upper_hf_penalty: 0.04
  upper_lpf_window: 6
