_extends: F_freqduet_terminal_waitattr_hiro.yaml
_name: F_freqduet_terminal_spline2r10_waitattr_hiro

upper:
  timetable_planner:
    # Direction-specific linear timetable curve with a 10-minute receding
    # horizon update cadence. This keeps the richer timetable action but gives
    # the upper learner nearly the same number of decisions as the scalar path.
    basis_per_direction: 2
    shared_directions: false
    plan_all_directions: true
    replan_interval_s: 600.0
    action_ema_alpha: 0.35
    smooth_penalty: 0.04
    delta_min_s: -60.0
    delta_max_s: 20.0
